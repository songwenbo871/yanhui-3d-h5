<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>颜回3D模型</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #d4af37;
      font-size: 18px;
      text-align: center;
    }
    
    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">颜回3D模型加载中...</div>
  <div id="canvas-container"></div>
  <div class="hint">左右滑动旋转 · 上下滑动缩放</div>
  
  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
  <!-- GLTF Loader -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
  
  <script>
    // 场景设置
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    
    // 相机
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 4);
    
    // 渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(2, 3, 2);
    directionalLight.castShadow = true;
    scene.add(directionalLight);
    
    const pointLight = new THREE.PointLight(0xd4af37, 0.5);
    pointLight.position.set(0, 2, 1);
    scene.add(pointLight);
    
    // 加载GLB模型
    let model = null;
    let isSpeaking = false;
    
    const loader = new THREE.GLTFLoader();
    loader.load(
      './models/yanhui.glb',
      function (gltf) {
        model = gltf.scene;
        
        // 调整模型位置和大小
        model.scale.set(1.5, 1.5, 1.5);
        model.position.set(0, -1, 0);
        
        // 启用阴影
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        
        scene.add(model);
        
        // 隐藏加载提示
        document.getElementById('loading').style.display = 'none';
        
        // 通知小程序加载完成
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'modelLoaded' }, '*');
        }
      },
      function (xhr) {
        console.log((xhr.loaded / xhr.total * 100) + '% loaded');
      },
      function (error) {
        console.error('模型加载失败:', error);
        document.getElementById('loading').textContent = '模型加载失败，请检查网络';
      }
    );
    
    // 触摸控制
    let touchStartX = 0;
    let touchStartY = 0;
    let rotationY = 0;
    let rotationX = 0;
    
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    
    document.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const deltaX = e.touches[0].clientX - touchStartX;
      const deltaY = e.touches[0].clientY - touchStartY;
      
      rotationY += deltaX * 0.01;
      rotationX += deltaY * 0.01;
      rotationX = Math.max(-0.5, Math.min(0.5, rotationX));
      
      if (model) {
        model.rotation.y = rotationY;
        model.rotation.x = rotationX;
      }
      
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    
    // 监听小程序消息
    window.addEventListener('message', (e) => {
      const data = e.data;
      
      if (data.type === 'speak') {
        isSpeaking = true;
        // 触发说话动画
        if (model) {
          // 这里可以触发模型的说话动画
          // 需要模型有对应的动画剪辑
        }
      } else if (data.type === 'stopSpeak') {
        isSpeaking = false;
      }
    });
    
    // 动画循环
    function animate() {
      requestAnimationFrame(animate);
      
      // 空闲时的自动旋转
      if (model && !isSpeaking) {
        model.rotation.y += 0.005;
      }
      
      // 说话时的动画
      if (model && isSpeaking) {
        model.position.y = -1 + Math.sin(Date.now() * 0.01) * 0.02;
      }
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    // 窗口大小调整
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
